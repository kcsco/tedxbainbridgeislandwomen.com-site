    <!--
      A11y: adds aria-expanded to the native Google Maps tilt button (.gm-tilt).
      The tilt button toggles visibility of sibling rotate buttons but Google Maps
      does not set aria-expanded, so screen readers cannot announce the state.
      Uses MutationObserver because map controls render asynchronously.

      Fragile: depends on Google Maps internal DOM (class "gm-tilt" and sibling
      rotate buttons with display toggling). Fails silently if Google changes
      the structure.
    -->
    <script>
      (function () {
        var mapContainer = document.getElementById('map_canvas');
        if (!mapContainer) {
          return;
        }

        var currentTiltButton = null;
        var parentObserver = null;
        var containerObserver = null;

        function getRotateSiblings(tiltButton) {
          var parent = tiltButton.parentElement;
          if (!parent) {
            return [];
          }
          var siblings = parent.querySelectorAll('button');
          var result = [];
          for (var i = 0; i < siblings.length; i++) {
            if (siblings[i] !== tiltButton) {
              result.push(siblings[i]);
            }
          }
          return result;
        }

        function isExpanded(tiltButton) {
          var siblings = getRotateSiblings(tiltButton);
          for (var i = 0; i < siblings.length; i++) {
            if (window.getComputedStyle(siblings[i]).display !== 'none') {
              return true;
            }
          }
          return false;
        }

        function updateAriaExpanded(tiltButton) {
          tiltButton.setAttribute(
            'aria-expanded',
            String(isExpanded(tiltButton)),
          );
        }

        function startContainerObserver() {
          containerObserver = new MutationObserver(function () {
            enhanceTiltButton();
          });
          containerObserver.observe(mapContainer, {
            childList: true,
            subtree: true,
          });
        }

        function enhanceTiltButton() {
          var tiltButton = mapContainer.querySelector('.gm-tilt');
          if (!tiltButton || tiltButton === currentTiltButton) {
            return;
          }

          if (parentObserver) {
            parentObserver.disconnect();
            parentObserver = null;
          }

          currentTiltButton = tiltButton;
          updateAriaExpanded(tiltButton);

          if (containerObserver) {
            containerObserver.disconnect();
            containerObserver = null;
          }

          var parent = tiltButton.parentElement;
          if (parent) {
            parentObserver = new MutationObserver(function () {
              if (!currentTiltButton || !currentTiltButton.isConnected) {
                if (parentObserver) {
                  parentObserver.disconnect();
                  parentObserver = null;
                }
                currentTiltButton = null;
                startContainerObserver();
                return;
              }
              updateAriaExpanded(currentTiltButton);
            });
            parentObserver.observe(parent, {
              attributes: true,
              attributeFilter: ['style'],
              subtree: true,
              childList: true,
            });
          }
        }

        startContainerObserver();
      })();
    </script>
